
<!doctype html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

  </head>
  <body>
    <div class="app">
      <aside class="left-pane">
        <div class="brand">
          <div class="brand-mark">CFN</div>
          <div>
            <h1>Clinical Function Navigator</h1>
            <p>患者支援ワークスペース</p>
          </div>
        </div>

        <div class="search-box">
          <input id="searchInput" type="search" placeholder="検索">
        </div>

        <nav id="entryTabs" class="entry-tabs"></nav>
        <div id="entryList" class="entry-list"></div>
      </aside>

      <main class="center-pane">
        <section id="homeView" class="home-view">
          <p class="tagline">患者支援に必要な視点を、一つに。<br>必要な情報を、必要な人へ、必要なタイミングで。</p>
          <div id="homeCards" class="home-cards"></div>
        </section>

        <section id="clinicalView" class="clinical-view hidden">
          <div class="clinical-header">
            <button id="homeButton" class="ghost-button" type="button">ホーム</button>
            <div>
              <p class="eyebrow">患者支援</p>
              <h2 id="clinicalTitle"></h2>
              <p id="clinicalDescription"></p>
            </div>
          </div>

          <div id="clinicalSections" class="clinical-sections"></div>
        </section>
      </main>

      <aside class="right-pane">
        <section class="panel-section">
          <h2>患者背景チェック</h2>
          <div class="background-check-grid">
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="75歳以上">75歳以上</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="CKD">CKD</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="低BMI">低BMI</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="食欲低下">食欲低下</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="体重減少">体重減少</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="転倒歴">転倒歴</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="独居">独居</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="認知症">認知症</label>
            <label class="check-option"><input type="checkbox" name="backgroundCheck" value="心不全">心不全</label>
          </div>
          <label>自由記載<textarea id="concernInput" rows="3" placeholder="例: 食事量が半分程度、家族が体重減少を心配"></textarea></label>
        </section>

        <section class="panel-section">
          <div class="output-header">
            <h2>SOAP</h2>
            <button id="copySoapButton" class="copy-button" type="button" onclick="copyOutput('soapOutput', 'SOAPをコピーしました')">コピー</button>
          </div>
          <textarea id="soapOutput" rows="8" readonly></textarea>
        </section>

        <section class="panel-section">
          <div class="output-header">
            <h2>薬歴</h2>
            <button id="copyHistoryButton" class="copy-button" type="button" onclick="copyOutput('historyOutput', '薬歴をコピーしました')">コピー</button>
          </div>
          <textarea id="historyOutput" rows="5" readonly></textarea>
        </section>

        <section class="panel-section">
          <div class="output-header">
            <h2>申し送り</h2>
            <button id="copyHandoffButton" class="copy-button" type="button" onclick="copyOutput('handoffOutput', '申し送りをコピーしました')">コピー</button>
          </div>
          <textarea id="handoffOutput" rows="5" readonly></textarea>
          <p id="copyFeedback" class="copy-feedback" aria-live="polite"></p>
        </section>
      </aside>
    </div>

    <div id="loading" class="loading">読み込み中...</div>
    <?!= include('script'); ?>
  </body>
</html>
